name: notification-prioritizer
version: "1.0"
description: AI environment for prioritizing notifications with a Focus Budget system.
tasks:
  - name: urgent
  - name: mixed
  - name: noisy
action_space:
  type: discrete
  actions: [notify, ignore, delay]
observation_space:
  type: object
  properties:
    id: integer
    app: string
    message: string
    sender: string
    user_state: string
    current_focus: float
    is_user_annoyed: boolean
reward:
  type: float
  range: [0.01, 0.99]
max_steps: 18
entry_point: env:NotificationEnv